version: "3.8"
services:
  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: always
    command:
      - rcd
      - --rc-addr=:5572
      - --rc-user=admin
      - --rc-pass=aa123456
      - --config=/config/rclone/rclone.conf
      - --log-level=INFO
    ports:
      - "5572:5572"
    volumes:
      - /docker/rcloneflow/rclone/config:/config/rclone
      - /docker/rcloneflow/rclone/cache:/root/.cache/rclone
    environment:
      - TZ=Asia/Shanghai

  rcloneflow:
    image: ray5378/rcloneflow:test-0.0.1
    container_name: rcloneflow
    restart: always
    ports:
      - "27870:17870"
    volumes:
      - /docker/rcloneflow/rcloneflow/data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - APP_ADDR=:17870
      - RCLONE_RC_ADDR=rclone:5572
      - RCLONE_RC_USER=admin
      - RCLONE_RC_PASS=aa123456
    depends_on:
      - rclone
