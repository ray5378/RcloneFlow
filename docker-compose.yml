version: "3.8"
services:
  rcloneflow:
    image: ray5378/rcloneflow:latest
    container_name: rcloneflow
    restart: always
    ports:
      - "17870:17870"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - APP_ADDR=:17870
      # CLI 直控 rclone，无需独立 RC 服务
      # 并发上限（默认 2）
      - RCLONE_MAX_PROCS=2
      # 日志级别（info/debug/warn/error）
      - LOG_LEVEL=info
      - LOG_OUTPUT=stdout
    # 可选：本地时区与内核限制
    # privileged: false
    # ulimits:
    #   nofile:
    #     soft: 65536
    #     hard: 65536
